<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sermon Recorder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap');

  :root {
    --navy: #1A3A5C;
    --navy-deep: #0F2640;
    --navy-light: #243F5C;
    --teal: #2A7FA5;
    --teal-light: #EAF4FA;
    --teal-border: #B0D8EC;
    --gold: #B8860B;
    --gold-light: #FDF6E3;
    --green: #1B6E3A;
    --green-light: #EAF5EE;
    --red: #B0271D;
    --red-light: #FDECEA;
    --gray-mid: #9096A3;
    --gray-light: #D8DAE0;
    --white: #FFFFFF;
    --offwhite: #F7F8FA;
    --charcoal: #2C2E33;
    --font-display: 'Lora', 'Georgia', serif;
    --font-body: 'Source Sans 3', 'Helvetica Neue', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    font-size: 14px;
    background: var(--navy-deep);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Nav ── */
  nav {
    background: var(--navy);
    height: 48px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    flex-shrink: 0;
  }

  nav .logo-mark {
    width: 24px; height: 24px;
    background: var(--teal);
    border-radius: 3px;
  }

  nav h1 {
    font-family: var(--font-display);
    font-size: 16px; font-weight: 700;
    color: var(--white);
  }

  nav button {
    margin-left: auto;
    background: none; border: none;
    color: #8BAAC4; font-family: var(--font-body);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
  }

  nav button:hover { color: var(--white); }

  /* ── Main ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px;
    padding-top: 15vh;
    gap: 16px;
  }

  /* ── Settings ── */
  .settings-panel {
    display: none;
    width: 100%; max-width: 480px;
    background: var(--navy);
    border: 1px solid var(--navy-light);
    border-radius: 4px;
    padding: 16px;
  }

  .settings-panel.open { display: block; }

  .settings-panel h3 {
    font-family: var(--font-display);
    font-size: 15px; margin-bottom: 12px;
  }

  .setting-group { margin-bottom: 12px; }

  .setting-group label {
    display: block; font-size: 13px;
    font-weight: 600; margin-bottom: 2px;
  }

  .setting-group small {
    display: block; font-size: 11px;
    color: var(--gray-mid); margin-bottom: 6px;
  }

  .setting-group input {
    width: 100%; padding: 8px 10px;
    border: 1px solid var(--navy-light);
    border-radius: 4px; font-size: 13px;
    font-family: var(--font-body);
    background: var(--navy-deep); color: var(--white);
  }

  .setting-group input:focus {
    outline: none; border-color: var(--teal);
  }

  .engine-toggle { display: flex; gap: 6px; margin-top: 6px; }

  .engine-btn {
    flex: 1; padding: 8px;
    border: 1px solid var(--navy-light);
    border-radius: 4px; background: var(--navy-deep);
    color: var(--gray-mid); font-size: 12px;
    font-weight: 600; font-family: var(--font-body);
    cursor: pointer; text-align: center;
  }

  .engine-btn.active {
    border-color: var(--teal);
    background: rgba(42,127,165,0.15);
    color: var(--teal);
  }

  /* ── Recorder ── */
  .recorder {
    text-align: center;
  }

  .record-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 3px solid var(--red);
    background: transparent;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease;
  }

  .record-btn:hover { background: rgba(176,39,29,0.1); }

  .record-btn .inner {
    width: 32px; height: 32px;
    background: var(--red);
    border-radius: 50%;
    transition: all 0.2s ease;
  }

  .record-btn.recording .inner {
    width: 22px; height: 22px;
    border-radius: 3px;
  }

  .record-btn.recording {
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { border-color: var(--red); }
    50% { border-color: rgba(176,39,29,0.3); }
  }

  .timer {
    font-family: var(--font-display);
    font-size: 20px; font-weight: 700;
    margin-top: 10px;
    font-variant-numeric: tabular-nums;
  }

  .record-label {
    font-size: 12px; color: var(--gray-mid);
    margin-top: 4px;
  }

  .waveform {
    margin-top: 10px; height: 36px;
    display: flex; align-items: center;
    justify-content: center; gap: 2px;
  }

  .waveform-bar {
    width: 3px; height: 4px;
    background: var(--teal);
    border-radius: 2px;
    transition: height 0.1s ease;
  }

  /* ── Analyze Button ── */
  .analyze-btn {
    padding: 12px 32px;
    background: var(--teal);
    color: var(--white);
    border: none; border-radius: 4px;
    font-size: 14px; font-weight: 700;
    font-family: var(--font-body);
    cursor: pointer;
    transition: background 0.2s ease;
  }

  .analyze-btn:hover { background: var(--navy); }
  .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Error ── */
  .error-msg {
    width: 100%; max-width: 480px;
    background: rgba(176,39,29,0.15);
    border: 1px solid var(--red);
    color: var(--red-light);
    padding: 8px 12px; border-radius: 4px;
    font-size: 13px; display: none;
  }

  .error-msg.visible { display: block; }

  /* ── Spinner ── */
  .spinner {
    display: none; text-align: center; padding: 16px;
  }

  .spinner.visible { display: block; }

  .spinner-ring {
    width: 36px; height: 36px;
    border: 3px solid var(--navy-light);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin: 0 auto 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .spinner p { color: var(--gray-mid); font-size: 13px; }

  /* ── Results ── */
  .results {
    display: none;
    width: 100%; max-width: 640px;
  }

  .results.visible { display: block; }

  .results-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 12px;
  }

  .results-header h2 {
    font-family: var(--font-display);
    font-size: 20px; font-weight: 700;
  }

  .results-actions { display: flex; gap: 6px; }

  .btn-sm {
    padding: 6px 12px;
    border: 1px solid var(--navy-light);
    border-radius: 4px; background: var(--navy);
    color: var(--gray-mid); font-size: 12px;
    font-weight: 500; font-family: var(--font-body);
    cursor: pointer;
  }

  .btn-sm:hover { border-color: var(--teal); color: var(--white); }

  /* ── Result Cards ── */
  .result-card {
    background: var(--navy);
    border: 1px solid var(--navy-light);
    border-left: 4px solid var(--teal);
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .result-card.gold-border { border-left-color: var(--gold); }
  .result-card.green-border { border-left-color: var(--green); }
  .result-card.navy-accent { border-left-color: var(--teal-border); }

  .result-card h3 {
    font-family: var(--font-display);
    font-size: 14px; font-weight: 600;
    margin-bottom: 8px;
    display: flex; justify-content: space-between;
    align-items: center;
  }

  .overline {
    font-size: 10px; font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--gray-mid);
    margin-bottom: 2px;
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--navy-light);
    border-radius: 4px; padding: 2px 8px;
    font-size: 10px; font-weight: 600;
    font-family: var(--font-body);
    cursor: pointer; color: var(--gray-mid);
  }

  .copy-btn:hover { border-color: var(--teal); color: var(--teal); }
  .copy-btn.copied { background: var(--teal); color: var(--white); border-color: var(--teal); }

  .result-card p, .result-card li {
    font-size: 13px; line-height: 1.6; color: var(--offwhite);
  }

  .result-card ol { padding-left: 1.2rem; }
  .result-card li { margin-bottom: 4px; }

  .quote-item {
    padding: 6px 0;
    border-bottom: 1px solid var(--navy-light);
    font-size: 13px; line-height: 1.5;
    color: var(--offwhite);
  }

  .quote-item:last-child { border-bottom: none; }

  .quote-number {
    font-family: var(--font-display);
    font-weight: 700; color: var(--teal);
    font-size: 12px; margin-right: 6px;
  }

  .verse-ref {
    font-family: var(--font-display);
    font-weight: 700; color: var(--gold);
  }

  .elevator-pitch {
    font-family: var(--font-display);
    font-size: 16px; font-weight: 600;
    text-align: center; padding: 12px;
    background: rgba(42,127,165,0.12);
    border: 1px solid var(--teal-border);
    border-radius: 4px;
    color: var(--teal-border);
    line-height: 1.5;
  }

  .prayer-text {
    font-style: italic; line-height: 1.7;
    color: var(--offwhite);
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .record-btn { width: 68px; height: 68px; }
    .record-btn .inner { width: 26px; height: 26px; }
    .timer { font-size: 18px; }
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .results.visible .result-card {
    animation: fadeUp 0.4s ease both;
  }

  .results.visible .result-card:nth-child(2) { animation-delay: 0.06s; }
  .results.visible .result-card:nth-child(3) { animation-delay: 0.12s; }
  .results.visible .result-card:nth-child(4) { animation-delay: 0.18s; }
  .results.visible .result-card:nth-child(5) { animation-delay: 0.24s; }
  .results.visible .result-card:nth-child(6) { animation-delay: 0.30s; }
</style>
</head>
<body>

<nav>
  <div class="logo-mark"></div>
  <h1>Sermon Recorder</h1>
  <button onclick="toggleSettings()">Settings</button>
</nav>

<div class="main">
  <!-- Settings -->
  <div class="settings-panel" id="settingsPanel">
    <h3>Configuration</h3>
    <div class="setting-group">
      <label>Anthropic API Key</label>
      <small>Required for analysis — console.anthropic.com</small>
      <input type="password" id="anthropicKey" placeholder="sk-ant-..." oninput="saveSetting('anthropicKey', this.value)">
    </div>
    <div class="setting-group">
      <label>OpenAI API Key (optional)</label>
      <small>Only for Whisper transcription</small>
      <input type="password" id="openaiKey" placeholder="sk-..." oninput="saveSetting('openaiKey', this.value)">
    </div>
    <div class="setting-group">
      <label>Transcription Engine</label>
      <div class="engine-toggle">
        <button class="engine-btn active" id="engineBrowser" onclick="setEngine('browser')">Browser (Free)</button>
        <button class="engine-btn" id="engineWhisper" onclick="setEngine('whisper')">Whisper</button>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Recorder -->
  <div class="recorder" id="recorderSection">
    <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
      <div class="inner"></div>
    </button>
    <div class="timer" id="timer">00:00</div>
    <div class="record-label" id="recordLabel">Tap to record</div>
    <div class="waveform" id="waveform"></div>
    <div style="margin-top:16px">
      <button class="analyze-btn" id="analyzeBtn" onclick="analyzeSermon()" style="display:none">Analyze Sermon</button>
    </div>
  </div>

  <!-- Spinner -->
  <div class="spinner" id="spinner">
    <div class="spinner-ring"></div>
    <p>Analyzing with Claude...</p>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results-header">
      <h2>Analysis</h2>
      <div class="results-actions">
        <button class="btn-sm" onclick="copyAll()">Copy All</button>
        <button class="btn-sm" onclick="downloadResults()">Download</button>
      </div>
    </div>

    <div class="result-card navy-accent" id="pitchCard">
      <div class="overline">Elevator Pitch</div>
      <h3><span></span><button class="copy-btn" onclick="copySection(this, 'pitch')">Copy</button></h3>
      <div class="elevator-pitch" id="pitchContent"></div>
    </div>

    <div class="result-card" id="summaryCard">
      <div class="overline">Summary</div>
      <h3>Main Points <button class="copy-btn" onclick="copySection(this, 'summary')">Copy</button></h3>
      <div id="summaryContent"></div>
    </div>

    <div class="result-card gold-border" id="quotesCard">
      <div class="overline">Sermon Arc</div>
      <h3>12 Key Quotes <button class="copy-btn" onclick="copySection(this, 'quotes')">Copy</button></h3>
      <div id="quotesContent"></div>
    </div>

    <div class="result-card green-border" id="versesCard">
      <div class="overline">Scripture</div>
      <h3>References <button class="copy-btn" onclick="copySection(this, 'verses')">Copy</button></h3>
      <div id="versesContent"></div>
    </div>

    <div class="result-card navy-accent" id="prayerCard">
      <div class="overline">Response</div>
      <h3>Prayer <button class="copy-btn" onclick="copySection(this, 'prayer')">Copy</button></h3>
      <div class="prayer-text" id="prayerContent"></div>
    </div>
  </div>
</div>

<script>
  let state = {
    recording: false, mediaRecorder: null, audioChunks: [], audioBlob: null,
    timerInterval: null, startTime: null, recognition: null, transcript: '',
    engine: 'browser', analyzerNode: null, animFrame: null, analysisData: null
  };

  (function init() {
    document.getElementById('anthropicKey').value = localStorage.getItem('anthropicKey') || '';
    document.getElementById('openaiKey').value = localStorage.getItem('openaiKey') || '';
    state.engine = localStorage.getItem('engine') || 'browser';
    updateEngineUI();
    const wf = document.getElementById('waveform');
    for (let i = 0; i < 32; i++) {
      const b = document.createElement('div');
      b.className = 'waveform-bar';
      wf.appendChild(b);
    }
  })();

  function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('open'); }
  function saveSetting(k, v) { localStorage.setItem(k, v); }
  function setEngine(e) { state.engine = e; localStorage.setItem('engine', e); updateEngineUI(); }
  function updateEngineUI() {
    document.getElementById('engineBrowser').classList.toggle('active', state.engine === 'browser');
    document.getElementById('engineWhisper').classList.toggle('active', state.engine === 'whisper');
  }

  async function toggleRecording() {
    state.recording ? stopRecording() : await startRecording();
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const ctx = new AudioContext();
      const src = ctx.createMediaStreamSource(stream);
      state.analyzerNode = ctx.createAnalyser();
      state.analyzerNode.fftSize = 128;
      src.connect(state.analyzerNode);
      animateWaveform();

      state.mediaRecorder = new MediaRecorder(stream);
      state.audioChunks = [];
      state.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) state.audioChunks.push(e.data); };
      state.mediaRecorder.onstop = () => {
        state.audioBlob = new Blob(state.audioChunks, { type: 'audio/webm' });
        stream.getTracks().forEach(t => t.stop());
        cancelAnimationFrame(state.animFrame);
        resetWaveform();
        if (state.engine === 'whisper') transcribeWithWhisper(state.audioBlob);
      };
      state.mediaRecorder.start(1000);

      if (state.engine === 'browser') startBrowserTranscription();

      state.recording = true;
      state.startTime = Date.now();
      document.getElementById('recordBtn').classList.add('recording');
      document.getElementById('recordLabel').textContent = 'Recording... tap to stop';
      document.getElementById('analyzeBtn').style.display = 'none';
      startTimer();
      hideError();
    } catch (err) {
      showError('Microphone access denied. Allow microphone access and try again.');
    }
  }

  function stopRecording() {
    state.recording = false;
    state.mediaRecorder.stop();
    if (state.recognition) { state.recognition.stop(); state.recognition = null; }
    clearInterval(state.timerInterval);
    document.getElementById('recordBtn').classList.remove('recording');
    document.getElementById('recordLabel').textContent = 'Recording complete';
    document.getElementById('analyzeBtn').style.display = 'inline-block';
  }

  function startTimer() {
    state.timerInterval = setInterval(() => {
      const e = Date.now() - state.startTime;
      const m = Math.floor(e / 60000), s = Math.floor((e % 60000) / 1000);
      document.getElementById('timer').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }, 200);
  }

  function animateWaveform() {
    const bars = document.querySelectorAll('.waveform-bar');
    const data = new Uint8Array(state.analyzerNode.frequencyBinCount);
    function draw() {
      state.analyzerNode.getByteFrequencyData(data);
      const step = Math.floor(data.length / bars.length);
      bars.forEach((bar, i) => {
        bar.style.height = Math.max(4, (data[i * step] || 0) / 255 * 32) + 'px';
      });
      state.animFrame = requestAnimationFrame(draw);
    }
    draw();
  }

  function resetWaveform() {
    document.querySelectorAll('.waveform-bar').forEach(b => b.style.height = '4px');
  }

  function startBrowserTranscription() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showError('Browser speech recognition not supported. Try Chrome or switch to Whisper.'); return; }
    state.recognition = new SR();
    state.recognition.continuous = true;
    state.recognition.interimResults = true;
    state.recognition.lang = 'en-US';
    let final = '';
    state.recognition.onresult = e => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
        else interim += e.results[i][0].transcript;
      }
      state.transcript = final + interim;
    };
    state.recognition.onerror = e => {};
    state.recognition.onend = () => { if (state.recording && state.engine === 'browser') try { state.recognition.start(); } catch(x) {} };
    state.recognition.start();
  }

  async function transcribeWithWhisper(blob) {
    const key = localStorage.getItem('openaiKey');
    if (!key) { showError('OpenAI API key required for Whisper. Add it in Settings.'); return; }
    document.getElementById('recordLabel').textContent = 'Transcribing with Whisper...';
    try {
      const fd = new FormData();
      fd.append('file', blob, 'sermon.webm');
      fd.append('model', 'whisper-1');
      fd.append('language', 'en');
      const r = await fetch('https://api.openai.com/v1/audio/transcriptions', {
        method: 'POST', headers: { 'Authorization': `Bearer ${key}` }, body: fd
      });
      if (!r.ok) throw new Error((await r.json()).error?.message || 'Whisper error');
      state.transcript = (await r.json()).text;
      document.getElementById('recordLabel').textContent = 'Transcription complete';
    } catch (err) {
      showError('Whisper failed: ' + err.message);
    }
  }

  async function analyzeSermon() {
    const key = localStorage.getItem('anthropicKey');
    if (!key) { showError('Add your Anthropic API key in Settings.'); return; }
    const t = state.transcript?.trim();
    if (!t || t.length < 50) { showError('Record a sermon first — transcript is too short.'); return; }

    document.getElementById('analyzeBtn').disabled = true;
    document.getElementById('spinner').classList.add('visible');
    document.getElementById('results').classList.remove('visible');
    hideError();

    const prompt = `You are a skilled theologian and sermon analyst. Analyze the following sermon transcript and return a JSON object with exactly these keys:

1. "elevator_pitch": A compelling 1-2 sentence summary someone could use to tell a friend about this sermon. Conversational and engaging.

2. "main_points": An array of 3-5 main points. Each a clear, complete sentence.

3. "key_quotes": An array of exactly 12 direct quotes capturing the arc of the entire message — opening to closing. The full journey, not just highlights.

4. "bible_verses": An array of 2-3 objects with "reference" and "relevance" (1-2 sentences on how it connects to this sermon). Choose verses that speak precisely to what was taught.

5. "prayer": A heartfelt prayer (3-5 sentences) inspired by the specific themes of this sermon.

Return ONLY valid JSON, no markdown, no code blocks.

SERMON TRANSCRIPT:
${t}`;

    try {
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 4096, messages: [{ role: 'user', content: prompt }] })
      });
      if (!r.ok) throw new Error((await r.json()).error?.message || `API error: ${r.status}`);
      const text = (await r.json()).content[0].text;
      let analysis;
      try { analysis = JSON.parse(text); } catch { const m = text.match(/\{[\s\S]*\}/); if (m) analysis = JSON.parse(m[0]); else throw new Error('Could not parse results'); }
      state.analysisData = analysis;
      renderResults(analysis);
    } catch (err) {
      showError('Analysis failed: ' + err.message);
    } finally {
      document.getElementById('analyzeBtn').disabled = false;
      document.getElementById('spinner').classList.remove('visible');
    }
  }

  function renderResults(d) {
    document.getElementById('pitchContent').textContent = d.elevator_pitch || '';
    document.getElementById('summaryContent').innerHTML = '<ol>' + (d.main_points || []).map(p => `<li>${esc(p)}</li>`).join('') + '</ol>';
    document.getElementById('quotesContent').innerHTML = (d.key_quotes || []).map((q, i) => `<div class="quote-item"><span class="quote-number">${i+1}.</span> "${esc(q)}"</div>`).join('');
    document.getElementById('versesContent').innerHTML = (d.bible_verses || []).map(v => `<p style="margin-bottom:8px"><span class="verse-ref">${esc(v.reference)}</span> — ${esc(v.relevance)}</p>`).join('');
    document.getElementById('prayerContent').textContent = d.prayer || '';
    document.getElementById('results').classList.add('visible');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function copySection(btn, section) {
    if (!state.analysisData) return;
    const d = state.analysisData;
    let text = '';
    switch (section) {
      case 'pitch': text = d.elevator_pitch; break;
      case 'summary': text = 'MAIN POINTS\n' + (d.main_points||[]).map((p,i) => `${i+1}. ${p}`).join('\n'); break;
      case 'quotes': text = '12 KEY QUOTES\n' + (d.key_quotes||[]).map((q,i) => `${i+1}. "${q}"`).join('\n'); break;
      case 'verses': text = 'SCRIPTURE\n' + (d.bible_verses||[]).map(v => `${v.reference} — ${v.relevance}`).join('\n\n'); break;
      case 'prayer': text = 'PRAYER\n' + d.prayer; break;
    }
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function copyAll() {
    if (!state.analysisData) return;
    const d = state.analysisData;
    navigator.clipboard.writeText([
      'SERMON ANALYSIS', '='.repeat(40), '', 'ELEVATOR PITCH', d.elevator_pitch, '',
      'MAIN POINTS', ...(d.main_points||[]).map((p,i) => `${i+1}. ${p}`), '',
      '12 KEY QUOTES', ...(d.key_quotes||[]).map((q,i) => `${i+1}. "${q}"`), '',
      'SCRIPTURE', ...(d.bible_verses||[]).map(v => `${v.reference} — ${v.relevance}`), '',
      'PRAYER', d.prayer
    ].join('\n'));
  }

  function downloadResults() {
    if (!state.analysisData) return;
    const d = state.analysisData;
    const text = ['SERMON ANALYSIS','='.repeat(40),'','ELEVATOR PITCH',d.elevator_pitch,'',
      'MAIN POINTS',...(d.main_points||[]).map((p,i)=>`${i+1}. ${p}`),'',
      '12 KEY QUOTES',...(d.key_quotes||[]).map((q,i)=>`${i+1}. "${q}"`),'',
      'SCRIPTURE',...(d.bible_verses||[]).map(v=>`${v.reference}\n${v.relevance}`),'',
      'PRAYER',d.prayer].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain' }));
    a.download = `sermon-${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
  }

  function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.classList.add('visible'); }
  function hideError() { document.getElementById('errorMsg').classList.remove('visible'); }
</script>
</body>
</html>
